name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Angular app
        run: npm run build -- --configuration production --base-href /

      - name: Verify Firebase Secret
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > sa.json
          echo "Secret file created"
          head -5 sa.json

      - name: Validate Firebase JSON
        run: |
          node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('sa.json','utf8')); console.log('Project:', j.project_id); console.log('Client Email:', j.client_email);"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: smartdevco-90cf0
          channelId: live
